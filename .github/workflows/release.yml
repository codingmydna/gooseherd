name: Release Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runs-on: macos-latest
          - target: x86_64-apple-darwin
            runs-on: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Update version in Cargo.toml
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          sed -i.bak 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          rm -f Cargo.toml.bak

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libxcb1-dev

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release -p goose-cli

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/goose LICENSE dist/
          tar -czf "goose-${{ matrix.target }}.tar.gz" -C dist goose LICENSE
          shasum -a 256 "goose-${{ matrix.target }}.tar.gz" > "goose-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goose-${{ matrix.target }}
          path: |
            goose-${{ matrix.target }}.tar.gz
            goose-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "goose-*.tar.gz,goose-*.tar.gz.sha256"
          allowUpdates: true
          generateReleaseNotes: true

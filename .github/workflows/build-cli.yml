# Reusable workflow that builds the goose CLI for the supported release targets:
# macOS arm64, macOS x86_64, and Linux x86_64 (gnu). It is not triggered on its
# own; it is called via `workflow_call`.
on:
  workflow_call:
    inputs:
      version:
        required: false
        default: ""
        type: string
      ref:
        required: false
        default: ""
        type: string

name: "Reusable workflow to build CLI"

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.build-on }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            build-on: macos-latest
          - target: x86_64-apple-darwin
            build-on: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            build-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Update version in Cargo.toml
        if: ${{ inputs.version != '' }}
        shell: bash
        run: |
          sed -i.bak 's/^version = ".*"/version = "'"${{ inputs.version }}"'"/' Cargo.toml
          rm -f Cargo.toml.bak

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libxcb1-dev

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        env:
          RUST_BACKTRACE: 1
        run: cargo build --release --target ${{ matrix.target }} -p goose-cli

      - name: Package CLI
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/goose" LICENSE dist/
          tar -czf "goose-${{ matrix.target }}.tar.gz" -C dist goose LICENSE
          shasum -a 256 "goose-${{ matrix.target }}.tar.gz" > "goose-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: goose-${{ matrix.target }}
          path: |
            goose-${{ matrix.target }}.tar.gz
            goose-${{ matrix.target }}.tar.gz.sha256
